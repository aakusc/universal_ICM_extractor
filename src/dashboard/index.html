<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICM Rule Builder</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --bg4: #2d333b;
      --border: #30363d;
      --border-muted: #21262d;
      --fg: #e6edf3;
      --fg2: #c9d1d9;
      --muted: #8b949e;
      --primary: #58a6ff;
      --primary-dim: rgba(88,166,255,0.12);
      --success: #3fb950;
      --success-dim: rgba(63,185,80,0.12);
      --warning: #d29922;
      --warning-dim: rgba(210,153,34,0.12);
      --error: #f85149;
      --error-dim: rgba(248,81,73,0.12);
      --purple: #bc8cff;
      --cyan: #39d353;
      --orange: #e3b341;
      --radius: 8px;
      --radius-sm: 6px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace;
      --sidebar-w: 260px;
      --header-h: 52px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      height: var(--header-h);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 24px;
      flex-shrink: 0;
    }
    .header-logo { font-size: 15px; font-weight: 700; color: var(--fg); letter-spacing: -0.02em; }
    .header-logo span { color: var(--primary); }
    .header-tabs { display: flex; gap: 2px; }
    .tab-btn {
      background: none; border: none; color: var(--muted);
      font: inherit; font-size: 13px; font-weight: 500;
      padding: 6px 14px; border-radius: var(--radius-sm);
      cursor: pointer; transition: all 0.12s;
    }
    .tab-btn:hover { color: var(--fg2); background: var(--bg3); }
    .tab-btn.active { color: var(--fg); background: var(--bg3); }
    .live-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--success);
      margin-left: 6px; vertical-align: middle;
    }

    /* ── Layout ─────────────────────────────────── */
    .app-body { display: flex; flex: 1; overflow: hidden; }
    .tab-panel { display: none; flex: 1; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
    }
    .sidebar-hdr {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .btn-new {
      background: var(--primary); color: #fff; border: none;
      font: inherit; font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: var(--radius-sm); cursor: pointer;
    }
    .btn-new:hover { opacity: 0.85; }
    .project-list { flex: 1; overflow-y: auto; padding: 6px; }
    .project-item {
      padding: 8px 10px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background 0.1s; margin-bottom: 2px;
    }
    .project-item:hover { background: var(--bg3); }
    .project-item.active { background: var(--primary-dim); border-left: 2px solid var(--primary); padding-left: 8px; }
    .project-name { font-size: 13px; font-weight: 500; color: var(--fg2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .empty-state { text-align: center; padding: 28px 12px; color: var(--muted); font-size: 12px; line-height: 1.7; }

    /* ── Main ─────────────────────────────────────── */
    .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .no-project {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; color: var(--muted);
    }
    .no-project-icon { font-size: 44px; opacity: 0.25; }
    .no-project p { font-size: 13px; }
    .project-detail { padding: 20px; display: flex; flex-direction: column; gap: 18px; }

    /* ── Section Cards ─────────────────────────────── */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .card-hdr {
      padding: 10px 14px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg3);
    }
    .card-title { font-size: 12px; font-weight: 600; color: var(--fg2); display: flex; align-items: center; gap: 8px; }
    .badge { background: var(--bg4); color: var(--muted); font-size: 11px; padding: 1px 6px; border-radius: 10px; }
    .card-body { padding: 12px 14px; }

    /* ── Project Header ─────────────────────────────── */
    .proj-hdr { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .proj-hdr h2 { font-size: 19px; font-weight: 700; color: var(--fg); }
    .proj-hdr p { font-size: 13px; color: var(--muted); margin-top: 3px; }

    /* ── Buttons ─────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      border: none; font: inherit; font-size: 12px; font-weight: 500;
      padding: 5px 11px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.12s;
    }
    .btn-ghost { background: var(--bg3); color: var(--fg2); }
    .btn-ghost:hover { background: var(--bg4); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger { background: var(--error-dim); color: var(--error); }
    .btn-danger:hover { background: rgba(248,81,73,0.2); }
    .btn-success { background: var(--success-dim); color: var(--success); }
    .btn-success:hover { background: rgba(63,185,80,0.2); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Drop Zone ─────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 20px; text-align: center; cursor: pointer;
      transition: all 0.15s; color: var(--muted); font-size: 13px; display: block;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-dim); color: var(--primary); }
    .drop-zone input[type=file] { display: none; }
    .drop-icon { font-size: 26px; margin-bottom: 6px; }

    .file-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; background: var(--bg3);
      border-radius: var(--radius-sm); border: 1px solid var(--border-muted);
    }
    .file-icon { font-size: 16px; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 12px; font-weight: 500; color: var(--fg2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 11px; color: var(--muted); }
    .fstatus { font-size: 11px; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
    .fstatus.ok { background: var(--success-dim); color: var(--success); }
    .fstatus.err { background: var(--error-dim); color: var(--error); }
    .fstatus.pend { background: var(--bg4); color: var(--muted); }

    /* ── Forms ─────────────────────────────────────── */
    .add-row { display: flex; gap: 7px; margin-bottom: 10px; }
    .add-row input, .add-row select {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--fg); font: inherit; font-size: 13px;
      padding: 5px 9px; border-radius: var(--radius-sm); outline: none;
    }
    .add-row input:focus { border-color: var(--primary); }
    .add-row input { flex: 1; }
    .item-list { display: flex; flex-direction: column; gap: 5px; }
    .item-row {
      display: flex; align-items: flex-start; gap: 7px;
      padding: 7px 9px; background: var(--bg3);
      border-radius: var(--radius-sm); font-size: 13px; color: var(--fg2);
    }
    .item-row .itext { flex: 1; }
    .pdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .ph .pdot { background: var(--error); }
    .pm .pdot { background: var(--warning); }
    .pl .pdot { background: var(--success); }
    .idel { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 0 2px; flex-shrink: 0; }
    .idel:hover { color: var(--error); }

    /* ── Extraction ─────────────────────────────────── */
    .insights-box {
      background: var(--bg3); border: 1px solid var(--border);
      border-left: 3px solid var(--primary); border-radius: var(--radius-sm);
      padding: 12px 14px; font-size: 13px; color: var(--fg2);
      line-height: 1.7; margin-bottom: 14px; white-space: pre-wrap;
    }
    .rules-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 8px; margin-bottom: 14px; }
    .rule-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; }
    .rule-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .ctag {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 2px 6px; border-radius: 4px; font-family: var(--mono); flex-shrink: 0;
    }
    .ct-rate-table    { background:rgba(88,166,255,.15); color:var(--primary); }
    .ct-accelerator   { background:rgba(63,185,80,.15);  color:var(--success); }
    .ct-decelerator   { background:rgba(248,81,73,.15);  color:var(--error); }
    .ct-qualifier     { background:rgba(210,153,34,.15); color:var(--warning); }
    .ct-split         { background:rgba(188,140,255,.15);color:var(--purple); }
    .ct-territory     { background:rgba(57,211,83,.15);  color:var(--cyan); }
    .ct-quota-target  { background:rgba(88,166,255,.15); color:var(--primary); }
    .ct-draw          { background:rgba(227,179,65,.15); color:var(--orange); }
    .ct-spif          { background:rgba(188,140,255,.15);color:var(--purple); }
    .ct-cap           { background:rgba(248,81,73,.15);  color:var(--error); }
    .ct-floor         { background:rgba(63,185,80,.15);  color:var(--success); }
    .ct-clawback      { background:rgba(248,81,73,.15);  color:var(--error); }
    .conf-bar { flex:1; height:3px; background:var(--bg4); border-radius:2px; overflow:hidden; }
    .conf-fill { height:100%; border-radius:2px; }
    .c-hi { background:var(--success); } .c-md { background:var(--warning); } .c-lo { background:var(--error); }
    .rule-desc { font-size:12px; color:var(--fg2); margin-bottom:4px; }
    .rule-src { font-size:11px; color:var(--muted); font-family:var(--mono); }

    /* ── CaptivateIQ Config Tabs ─────────────────── */
    .cfg-tabs { display:flex; gap:2px; margin-bottom:10px; border-bottom:1px solid var(--border); }
    .cfg-tab {
      background:none; border:none; color:var(--muted); font:inherit;
      font-size:12px; font-weight:500; padding:5px 10px; cursor:pointer;
      border-bottom:2px solid transparent; margin-bottom:-1px;
    }
    .cfg-tab:hover { color:var(--fg2); }
    .cfg-tab.active { color:var(--primary); border-bottom-color:var(--primary); }
    .cfg-panel { display:none; }
    .cfg-panel.active { display:block; }
    .cfg-tbl { width:100%; border-collapse:collapse; font-size:12px; }
    .cfg-tbl th { text-align:left; padding:5px 7px; color:var(--muted); border-bottom:1px solid var(--border); font-size:10px; text-transform:uppercase; letter-spacing:.05em; }
    .cfg-tbl td { padding:5px 7px; color:var(--fg2); border-bottom:1px solid var(--border-muted); vertical-align:top; }
    .cfg-tbl tr:last-child td { border-bottom:none; }
    .cfg-tbl td:first-child { font-family:var(--mono); color:var(--primary); white-space:nowrap; }
    .subcard { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px; margin-bottom:7px; }
    .subcard-title { font-size:12px; font-weight:600; color:var(--fg); margin-bottom:3px; }
    .pseudo { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:7px 10px; font-family:var(--mono); font-size:12px; color:var(--success); white-space:pre-wrap; margin-top:4px; }
    .ciq-note { background:var(--primary-dim); border:1px solid rgba(88,166,255,.2); border-radius:var(--radius-sm); padding:6px 10px; font-size:12px; color:var(--primary); margin-top:5px; }
    .dl-row { display:flex; gap:7px; margin-top:10px; justify-content:flex-end; }

    /* ── Connector Tab ─────────────────────────────── */
    .conn-layout { flex:1; overflow-y:auto; padding:20px; max-width:860px; margin:0 auto; width:100%; }
    .conn-stitle { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
    .conn-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:8px; }
    .conn-acc {
      width:100%; background:none; border:none; color:var(--fg2);
      font:inherit; font-size:13px; font-weight:500;
      padding:12px 14px; text-align:left; cursor:pointer;
      display:flex; align-items:center; gap:8px;
    }
    .conn-acc:hover { background:var(--bg3); }
    .cdot { width:7px; height:7px; border-radius:50%; background:var(--border); flex-shrink:0; }
    .cdot.on { background:var(--success); box-shadow:0 0 5px rgba(63,185,80,.5); }
    .cbadge { font-size:10px; padding:2px 6px; border-radius:10px; font-weight:600; }
    .cbadge.live { background:var(--success-dim); color:var(--success); }
    .cbadge.soon { background:var(--bg4); color:var(--muted); }
    .chev { font-size:10px; color:var(--muted); transition:transform .2s; margin-left:auto; }
    .conn-form { padding:14px; border-top:1px solid var(--border); display:none; }
    .conn-form.open { display:block; }
    .flbl { font-size:12px; font-weight:500; color:var(--muted); margin-bottom:3px; display:block; }
    .finput {
      width:100%; background:var(--bg3); border:1px solid var(--border);
      color:var(--fg); font:inherit; font-size:13px; font-family:var(--mono);
      padding:6px 9px; border-radius:var(--radius-sm); outline:none; margin-bottom:10px;
    }
    .finput:focus { border-color:var(--primary); }
    .conn-acts { display:flex; gap:7px; flex-wrap:wrap; }
    .conn-result { margin-top:10px; }

    /* ── Toast ─────────────────────────────────────── */
    .toast-wrap { position:fixed; bottom:18px; right:18px; display:flex; flex-direction:column; gap:7px; z-index:9999; }
    .toast {
      background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:9px 13px; font-size:13px; color:var(--fg2); max-width:300px;
      animation:tin .18s ease; box-shadow:0 4px 12px rgba(0,0,0,.5);
    }
    .toast.ok { border-left:3px solid var(--success); }
    .toast.err { border-left:3px solid var(--error); }
    @keyframes tin { from { transform:translateY(6px); opacity:0; } to { transform:none; opacity:1; } }

    /* ── Spinner ─────────────────────────────────── */
    .spin { display:inline-block; width:13px; height:13px; border:2px solid var(--bg4); border-top-color:var(--primary); border-radius:50%; animation:rot .7s linear infinite; }
    @keyframes rot { to { transform:rotate(360deg); } }

    /* ── Scrollbars ─────────────────────────────── */
    * { scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">ICM <span>Rule Builder</span></div>
  <nav class="header-tabs">
    <button class="tab-btn active" onclick="switchTab('builder')" id="tbtn-builder">
      Builder <span class="live-dot"></span>
    </button>
    <button class="tab-btn" onclick="switchTab('connector')" id="tbtn-connector">API Connector</button>
  </nav>
</header>

<div class="app-body">

  <!-- ── BUILDER ─────────────────────────────────── -->
  <div class="tab-panel active" id="panel-builder">
    <aside class="sidebar">
      <div class="sidebar-hdr">
        <span class="sidebar-title">Projects</span>
        <button class="btn-new" onclick="promptCreateProject()">+ New</button>
      </div>
      <div class="project-list" id="proj-list">
        <div class="empty-state">No projects yet.<br>Click + New to start.</div>
      </div>
    </aside>
    <main class="main-content" id="main">
      <div class="no-project" id="no-proj">
        <div class="no-project-icon">📊</div>
        <p>Select or create a project.</p>
      </div>
      <div class="project-detail" id="proj-detail" style="display:none"></div>
    </main>
  </div>

  <!-- ── CONNECTOR ───────────────────────────────── -->
  <div class="tab-panel" id="panel-connector">
    <div class="conn-layout">
      <div style="margin-bottom:20px">
        <div class="conn-stitle">ICM Vendor Connectors</div>
        <div class="conn-wrap">
          <button class="conn-acc" onclick="toggleAcc(this)">
            <span class="cdot on"></span>
            CaptivateIQ
            <span class="cbadge live">Live</span>
            <span class="chev">▼</span>
          </button>
          <div class="conn-form" data-vendor="captivateiq">
            <label class="flbl">API Token</label>
            <input class="finput" type="password" name="apiKey" placeholder="ciq_...">
            <label class="flbl">Base URL</label>
            <input class="finput" type="text" name="baseUrl" value="https://api.captivateiq.com/ciq/v1">
            <div class="conn-acts">
              <button class="btn btn-ghost" onclick="connTest(this,'captivateiq')">Test Connection</button>
              <button class="btn btn-ghost" onclick="connListPlans(this,'captivateiq')">List Plans</button>
              <button class="btn btn-success" onclick="connExtract(this,'captivateiq')">Extract Rules</button>
            </div>
            <div class="conn-result"></div>
          </div>
        </div>
        <div id="planned-v"></div>
      </div>
      <div>
        <div class="conn-stitle">Rule Concept Taxonomy</div>
        <div class="conn-wrap" style="padding:14px">
          <table class="cfg-tbl"><thead><tr><th>Concept</th><th>Description</th></tr></thead>
          <tbody id="tax-tb"></tbody></table>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toasts"></div>

<script>
'use strict';

// ── State ───────────────────────────────────────────
var S = { projects:[], pid:null, files:[], reqs:[], notes:[], extractions:{}, aggregation:null };

// ── API ─────────────────────────────────────────────
async function api(method, path, body) {
  var opts = { method: method, headers:{'Content-Type':'application/json'} };
  if (body !== undefined) opts.body = JSON.stringify(body);
  var res = await fetch(path, opts);
  var d = await res.json();
  if (!res.ok) throw new Error(d.error || 'API error ' + res.status);
  return d;
}

// ── Toast ───────────────────────────────────────────
function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast ' + (type==='success'?'ok':type==='error'?'err':'');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(function(){ el.remove(); }, 3500);
}

// ── Tabs ────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tbtn-'+name).classList.add('active');
}

// ── Escape ──────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Projects ────────────────────────────────────────
async function loadProjects() {
  var d = await api('GET','/api/builder/projects');
  S.projects = d.projects||[];
  renderProjList();
}

function renderProjList() {
  var el = document.getElementById('proj-list');
  if (!S.projects.length) { el.innerHTML = '<div class="empty-state">No projects yet.<br>Click + New to start.</div>'; return; }
  el.innerHTML = S.projects.map(function(p){
    var a = p.id===S.pid?' active':'';
    return '<div class="project-item'+a+'" onclick="selProj(\''+p.id+'\')">'
      +'<div class="project-name">'+esc(p.name)+'</div>'
      +'<div class="project-meta">'+new Date(p.updatedAt).toLocaleDateString()+'</div>'
      +'</div>';
  }).join('');
}

async function selProj(id) {
  S.pid = id; renderProjList(); await loadDetail(id);
}

async function loadDetail(id) {
  var [fd,rd,nd] = await Promise.all([
    api('GET','/api/builder/projects/'+id+'/files'),
    api('GET','/api/builder/projects/'+id+'/requirements'),
    api('GET','/api/builder/projects/'+id+'/notes'),
  ]);
  S.files = fd.files||[]; S.reqs = rd.requirements||[]; S.notes = nd.notes||[];
  // Try to load existing aggregation — 404 is fine (not yet run)
  S.aggregation = null;
  try { var ag = await api('GET','/api/builder/projects/'+id+'/aggregate'); S.aggregation = ag; } catch(_){}
  renderDetail();
}

function renderDetail() {
  var p = S.projects.find(function(x){ return x.id===S.pid; });
  if (!p) return;
  document.getElementById('no-proj').style.display = 'none';
  var det = document.getElementById('proj-detail');
  det.style.display = 'flex';

  det.innerHTML =
    '<div class="proj-hdr">'
      +'<div><h2>'+esc(p.name)+'</h2>'+(p.description?'<p>'+esc(p.description)+'</p>':'')+'</div>'

function bindUpload() {
  var dz = document.getElementById('drop-zone');
  var fi = document.getElementById('file-in');
  if (!dz||!fi) return;
  fi.onchange = function(){ if(this.files) uploadFiles(this.files); };
  dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('drag-over'); });
  dz.addEventListener('drop', function(e){ e.preventDefault(); dz.classList.remove('drag-over'); if(e.dataTransfer&&e.dataTransfer.files) uploadFiles(e.dataTransfer.files); });
}

async function uploadFiles(list) {
  for (var i=0; i<list.length; i++) {
    var f = list[i];
    try {
      var b64 = await toBase64(f);
      await api('POST','/api/builder/projects/'+S.pid+'/files',{filename:f.name,data:b64,mimeType:f.type});
      toast('Uploaded '+f.name,'success');
    } catch(e){ toast('Upload failed: '+e.message,'error'); }
  }
  await loadDetail(S.pid);
}

function toBase64(file) {
  return new Promise(function(res,rej){
    var r = new FileReader();
    r.onload = function(e){ res(e.target.result.split(',')[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

  try { await api('DELETE','/api/builder/projects/'+S.pid+'/files/'+id); toast('Deleted','success'); await loadDetail(S.pid); }
  catch(e){ toast(e.message,'error'); }
}

// Global ref for download
var _lastExtResult = null;

async function runExtract(fileId, fname) {
  var card = document.getElementById('ext-card');
  if (!card) { toast('No extraction card found','error'); return; }
  var body = document.getElementById('ext-body');
  body.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:20px;color:var(--muted);font-size:13px">'
    +'<div class="spin"></div>'
    +'<span>Analyzing <strong style="color:var(--fg2)">'+esc(fname)+'</strong> with Claude Opus 4.6…<br><span style="font-size:12px">This may take 30–90 seconds depending on workbook complexity.</span></span>'
    +'</div>';
  card.scrollIntoView({behavior:'smooth',block:'nearest'});

  try {
    var result = await api('POST','/api/builder/projects/'+S.pid+'/files/'+fileId+'/extract',{});
    _lastExtResult = result;
    S.extractions[fileId] = result;
    renderExtResult(body, result, fname);
    toast('Extraction complete — '+result.ruleCount+' rules','success');
  } catch(e) {
    body.innerHTML = '<div style="padding:16px;color:var(--error);font-size:13px">Extraction failed: '+esc(e.message)+'</div>';
    toast('Extraction failed: '+e.message,'error');
  }
}

function renderExtResult(container, r, fname) {
  var rules = r.rules||[];
  var rulesHtml = rules.map(function(rule){
    var cls = 'ct-'+(rule.concept||'').replace(/\s+/g,'-');
    var conf = Math.round((rule.confidence||0)*100);
    var fillCls = conf>=70?'c-hi':conf>=40?'c-md':'c-lo';
    return '<div class="rule-card">'
      +'<div class="rule-top"><span class="ctag '+cls+'">'+(rule.concept||'unknown')+'</span>'
      +'<div class="conf-bar"><div class="conf-fill '+fillCls+'" style="width:'+conf+'%"></div></div>'
      +'<span style="font-size:11px;color:var(--muted);flex-shrink:0">'+conf+'%</span></div>'
      +'<div class="rule-desc">'+esc(rule.description||'')+'</div>'
      +(rule.sourceRef?'<div class="rule-src">'+esc(rule.sourceRef.vendorRuleId||'')+'</div>':'')
    +'</div>';
  }).join('');

  container.innerHTML =
    (r.insights?'<div class="insights-box">'+esc(r.insights)+'</div>':'')
    +(rules.length?'<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+rules.length+' Rules Identified</div>':'')
    +(rulesHtml?'<div class="rules-grid">'+rulesHtml+'</div>':'')
    +'<div style="font-size:12px;font-weight:700;color:var(--fg);margin-bottom:10px">CaptivateIQ Build Configuration</div>'
    +buildCfgTabs(r.captivateiqConfig||{})
    +'<div class="dl-row">'
      +'<button class="btn btn-ghost" onclick="copyJson()">Copy JSON</button>'
      +'<button class="btn btn-success" onclick="downloadJson()">⬇ Download</button>'
    +'</div>';
}

  prefix = prefix || '';

    return '<button class="cfg-tab'+(i===0?' active':'')+'" onclick="swCfg(this,\''+prefix+'cfgp-'+l[0]+'\')">'+l[1]+'</button>';
  }).join('');

  // plan
  var pl = cfg.planStructure||{};
  var planH = '<table class="cfg-tbl"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>'
    +'<tr><td>planName</td><td>'+esc(pl.planName||'—')+'</td></tr>'
    +'<tr><td>periodType</td><td>'+esc(pl.periodType||'—')+'</td></tr>'
    +'<tr><td>payoutComponents</td><td>'+esc((pl.payoutComponents||[]).join(', ')||'—')+'</td></tr>'
    +(pl.notes?'<tr><td>notes</td><td>'+esc(pl.notes)+'</td></tr>':'')
    +'</tbody></table>';

  // worksheets

    ? (cfg.dataWorksheets||[]).map(function(ws){
        return '<div class="subcard"><div class="subcard-title">'+esc(ws.name)+'<span style="font-size:10px;color:var(--muted);margin-left:6px">['+esc(ws.concept)+']</span></div>'
          +'<div style="font-size:12px;color:var(--muted);margin-bottom:3px">'+esc(ws.description||'')+'</div>'
          +'<div style="font-size:11px;color:var(--primary);font-family:var(--mono)">'+esc((ws.columns||[]).map(function(c){return c.name+'('+c.type+')';}).join(', '))+'</div>'
        +'</div>';
      }).join('')
    : '<div style="font-size:13px;color:var(--muted)">None identified.</div>';

  // employee assumptions
  var eaH = (cfg.employeeAssumptionColumns||[]).length
    ? '<table class="cfg-tbl"><thead><tr><th>Column</th><th>Type</th><th>Concept</th><th>Description</th></tr></thead><tbody>'
      +(cfg.employeeAssumptionColumns||[]).map(function(c){
          return '<tr><td>'+esc(c.name)+'</td><td>'+esc(c.type)+'</td><td>'+esc(c.concept||'')+'</td><td>'+esc(c.description||'')+'</td></tr>';
        }).join('')+'</tbody></table>'
    : '<div style="font-size:13px;color:var(--muted)">None identified.</div>';

  // attributes
  var atH = (cfg.attributeWorksheets||[]).length
    ? (cfg.attributeWorksheets||[]).map(function(a){
        return '<div class="subcard"><div class="subcard-title">'+esc(a.name)+'<span style="font-size:10px;color:var(--muted);margin-left:6px">['+esc(a.concept)+'] pk:'+esc(a.pkType||'')+'</span></div>'
          +'<div style="font-size:12px;color:var(--muted);margin-bottom:3px">'+esc(a.description||'')+'</div>'
          +'<div style="font-size:11px;color:var(--primary);font-family:var(--mono)">'+esc((a.columns||[]).map(function(c){return c.name+'('+c.type+')';}).join(', '))+'</div>'
        +'</div>';
      }).join('')
    : '<div style="font-size:13px;color:var(--muted)">None identified.</div>';

  // formulas
  var fmH = (cfg.formulaRecommendations||[]).length
    ? (cfg.formulaRecommendations||[]).map(function(fr){
        var tc = 'ct-'+(fr.concept||'').replace(/\s+/g,'-');
        return '<div class="subcard">'
          +'<div class="subcard-title"><span class="ctag '+tc+'">'+esc(fr.concept)+'</span> '+esc(fr.description||'')+'</div>'

          +(fr.captivateiqNotes?'<div class="ciq-note">💡 '+esc(fr.captivateiqNotes)+'</div>':'')
        +'</div>';
      }).join('')
    : '<div style="font-size:13px;color:var(--muted)">None identified.</div>';

  return '<div class="cfg-tabs">'+tabsH+'</div>'
    +'<div id="'+prefix+'cfgp-plan" class="cfg-panel active">'+planH+'</div>'
    +'<div id="'+prefix+'cfgp-ws" class="cfg-panel">'+wsH+'</div>'
    +'<div id="'+prefix+'cfgp-ea" class="cfg-panel">'+eaH+'</div>'
    +'<div id="'+prefix+'cfgp-attr" class="cfg-panel">'+atH+'</div>'
    +'<div id="'+prefix+'cfgp-fm" class="cfg-panel">'+fmH+'</div>';
}

function swCfg(btn, pid) {
  var root = btn.closest('#ext-body')||btn.closest('.card-body');
  root.querySelectorAll('.cfg-tab').forEach(function(t){ t.classList.remove('active'); });
  root.querySelectorAll('.cfg-panel').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  var p = document.getElementById(pid);
  if (p) p.classList.add('active');
}

function copyJson() {
  if (!_lastExtResult) { toast('No extraction data','error'); return; }
  navigator.clipboard.writeText(JSON.stringify(_lastExtResult,null,2)).then(function(){ toast('Copied!','success'); });
}

function downloadJson() {
  if (!_lastExtResult) { toast('No extraction data','error'); return; }
  var blob = new Blob([JSON.stringify(_lastExtResult,null,2)],{type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href=url; a.download='captivateiq-config.json'; a.click(); URL.revokeObjectURL(url);
}

function getConnAuth(btn) {
  var auth = {};
  btn.closest('.conn-form').querySelectorAll('input').forEach(function(inp){ if(inp.name) auth[inp.name]=inp.value; });
  return auth;
}

async function connTest(btn, vendor) {
  var res = btn.closest('.conn-form').querySelector('.conn-result');
  res.innerHTML = '<span style="color:var(--muted);font-size:13px"><span class="spin"></span> Testing…</span>';
  try {
    var d = await api('POST','/api/test-connection',{vendor:vendor,auth:getConnAuth(btn)});
    res.innerHTML = d.connected
      ? '<span style="color:var(--success);font-size:13px">✓ Connected'+(d.vendorName?' to '+esc(d.vendorName):'')+'</span>'
      : '<span style="color:var(--error);font-size:13px">✗ '+esc(d.error||'Failed')+'</span>';
  } catch(e){ res.innerHTML = '<span style="color:var(--error);font-size:13px">✗ '+esc(e.message)+'</span>'; }
}

async function connListPlans(btn, vendor) {
  var form = btn.closest('.conn-form');
  var res = form.querySelector('.conn-result');
  res.innerHTML = '<span style="color:var(--muted);font-size:13px"><span class="spin"></span> Loading plans…</span>';
  try {
    var d = await api('POST','/api/list-plans',{vendor:vendor,auth:getConnAuth(btn)});
    var plans = d.plans||[];
    if (!plans.length) { res.innerHTML='<span style="color:var(--muted);font-size:13px">No plans found.</span>'; return; }
    res.innerHTML = '<div style="margin-top:7px">'
      +plans.map(function(p){ return '<div style="padding:5px 9px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:4px;font-size:12px;color:var(--fg2)"><strong>'+esc(p.name||p.id||'')+'</strong>'+(p.id?' <span style="color:var(--muted)">('+esc(String(p.id))+')</span>':'')+'</div>'; }).join('')
    +'</div>';
  } catch(e){ res.innerHTML='<span style="color:var(--error);font-size:13px">✗ '+esc(e.message)+'</span>'; }
}

async function connExtract(btn, vendor) {
  var form = btn.closest('.conn-form');
  var res = form.querySelector('.conn-result');
  res.innerHTML = '<span style="color:var(--muted);font-size:13px"><span class="spin"></span> Extracting…</span>';
  try {
    var d = await api('POST','/api/extract-rules',{vendor:vendor,auth:getConnAuth(btn)});
    var rules = d.rules||[];
    var blob = new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    var url = URL.createObjectURL(blob);
    res.innerHTML = '<div style="margin-top:7px;font-size:12px;color:var(--muted)">'
      +rules.length+' rules extracted. '
      +'<a href="'+url+'" download="extracted-rules.json" style="color:var(--primary)">Download JSON</a>'
    +'</div>';
  } catch(e){ res.innerHTML='<span style="color:var(--error);font-size:13px">✗ '+esc(e.message)+'</span>'; }
}

// ── Taxonomy ─────────────────────────────────────────
var TAX = [
  ['rate-table','Commission rate lookup — flat, tiered, or matrix'],
  ['accelerator','Rate increase above quota threshold'],
  ['decelerator','Rate decrease below quota threshold'],
  ['qualifier','Gate condition — must hit threshold to earn'],
  ['split','Credit splitting between reps or roles'],
  ['territory','Geographic or account assignment rules'],
  ['quota-target','Quota / target definition and allocation'],
  ['draw','Guaranteed minimum / recoverable draw'],
  ['spif','Special incentive, bonus, or contest'],
  ['cap','Maximum earning limit'],
  ['floor','Minimum earning guarantee'],
  ['clawback','Recovery of previously paid commissions'],
];

function renderTax() {
  var tb = document.getElementById('tax-tb');
  if (!tb) return;
  tb.innerHTML = TAX.map(function(r){ return '<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>'; }).join('');
}

function renderPlanned() {
  var vv = [['Varicent','OAuth2'],['Xactly Incent','API Key'],['SAP SuccessFactors','OAuth2'],['Salesforce / Spiff','OAuth2']];
  document.getElementById('planned-v').innerHTML = vv.map(function(v){
    return '<div class="conn-wrap"><button class="conn-acc" disabled style="cursor:default;opacity:.5">'
      +'<span class="cdot"></span>'+v[0]+'<span class="cbadge soon">Soon</span></button></div>';
  }).join('');
}

// ── Init ─────────────────────────────────────────────
(async function(){
  renderTax(); renderPlanned();
  try { await loadProjects(); } catch(e){ toast('Failed to load projects: '+e.message,'error'); }
})();
</script>
